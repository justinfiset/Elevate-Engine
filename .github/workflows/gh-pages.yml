name: Doxygen and Web Build Deploy

on:
  workflow_run:
      workflows: ["Build Elevate Engine"]
      types:
        - completed

jobs:
  deploy-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate Doxygen Docs
        run: doxygen Docs/Doxyfile

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: Docs/html/

  deploy-web-editor:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master
        with:
          version: 1.12.1

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Generate and Compile Editor
        run: |
          ./vendor/premake/premake5.exe --os=emscripten ninja
          ninja Editor_Release

      - name: Upload Editor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-editor
          path: Build/bin/Editor_Release-emscripten-wasm32/

  deploy-web-runtime:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master
        with:
          version: 1.12.1

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Generate and Compile Runtime
        run: |
          ./vendor/premake/premake5.exe --os=emscripten ninja
          ninja Release

      - name: Upload Runtime Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: Build/bin/Release-emscripten-wasm32/
  
  finalize-deployment:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    needs: [deploy-docs, deploy-web-editor, deploy-web-runtime]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      statuses: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docs Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: public

      - name: Download Web Editor Release Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build-editor
          path: public/editor

      - name: Download Web Release Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: public/runtime

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          merge-multiple: true
          pattern: allure-results-*
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Allure Results
        run: |
          mkdir -p allure-results
          ls -R allure-results

      - name: Clean JUnit XML
        run: |
          # Delete everything after </testsuites> in the JUnit XML to prevent parsing errors
          sed -i 's/<\/testsuites>.*/<\/testsuites>/' allure-results/junit-results.xml
          # Output the cleaned JUnit XML for debugging
          cat allure-results/junit-results.xml

      - name: Generate Allure Test Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          allure_report: public/tests
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          clean: true
