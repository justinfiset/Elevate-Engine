name: IWYU Automated Report

on: [push]

jobs:
  iwyu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate Compile Commands
        run: |
          chmod +x ./vendor/premake/premake5-linux

          ./vendor/premake/premake5-linux export-compile-commands

          cp compile_commands/editor_debug.json compile_commands.json

          sed -i 's/-MMD//g' compile_commands.json
          sed -i 's/-MP//g' compile_commands.json
          sed -i 's/"command": "cc/"command": "cc -std=c++2a/g' compile_commands.json

          jq -r '.[].directory' compile_commands.json | xargs mkdir -p

      - name: Run Include What You Use
        uses: EmilGedda/include-what-you-use-action@v1.0
        with:
          compilation-database-path: '.'
          output-format: 'iwyu'
          no-error: 'true'